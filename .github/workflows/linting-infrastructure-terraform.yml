name: "[Linting - Infrastructure] Terraform Lint"


on:
  workflow_call:
    inputs:
      terraform_version:
        type: string
        description: "Version of terraform to use"
        required: true
      terraform_wrapper:
        type: boolean
        description: "Enable terraform wrapper"
        default: false
        required: false
      directory:
        type: string
        description: "Directory path to lint"
        default: "./terraform"
        required: false
      tflint_check:
        type: boolean
        description: "Enable tflint check"
        default: true
        required: false

jobs:
  terraform_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: ${{ inputs.terraform_wrapper }}
      - name: "Run Terraform fmt"
        working-directory: ${{ inputs.directory }}
        run: terraform fmt -check -recursive
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@ae78205cfffec9e8d93fd2b3115c7e9d3166d4b6 # v5.0.0
        if: ${{ inputs.tflint_check }}
      - name: "Run TFLint"
        working-directory: ${{ inputs.directory }}
        if: ${{ inputs.tflint_check }}
        run: tflint --recursive
