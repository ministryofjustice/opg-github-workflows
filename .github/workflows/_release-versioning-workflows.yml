name: "[Release] Versioning workflows"

on:
  push:
    branches: [main]


jobs:
  lint_yaml:
    name: "Lint YAML"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: yaml-lint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3.1.1
        with:
          file_or_dir: .github/workflows/*.yml

  # generate branch name
  branch_name:
    name: "Branch name"
    uses: ./.github/workflows/data-parse-branch-name.yml
    secrets: inherit
  # generate semver tag
  semver_tag:
    needs: [branch_name]
    name: "Generate semver tag and release"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: "0"
      - name: Generate semver tag and release
        uses: ministryofjustice/opg-github-actions/actions/semver@b8868247a908f74fafe1905701391580575a6d35 # v4.3.10
        with:
          branch_name: ${{ needs.branch_name.outputs.branch_name }}
          create_release: true
          default_bump: ${{ github.event_name == 'workflow_dispatch' && 'none' || 'minor' }}
          prerelease: ${{ github.ref_name == 'main' && 'false' || 'true' }}

  summary:
    if: always()
    name: Release
    runs-on: 'ubuntu-latest'
    needs: [branch_name, semver_tag]
    steps:
      - id: summary
        name: "Summary"
        run: |
          echo "### Release Information" >> $GITHUB_STEP_SUMMARY
          echo "| Segment | Variable | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- | --- |"  >> $GITHUB_STEP_SUMMARY
          echo "| Branch | Branch Name | ${{ needs.branch_name.outputs.branch_name }} |"  >> $GITHUB_STEP_SUMMARY
          echo "| Branch | Safe | ${{ needs.branch_name.outputs.safe }} |"  >> $GITHUB_STEP_SUMMARY
          echo "| Branch | Full Length | ${{ needs.branch_name.outputs.full_length }} |"  >> $GITHUB_STEP_SUMMARY
          echo "| Semver | Tag | ${{ needs.semver_tag.outputs.tag }} |"  >> $GITHUB_STEP_SUMMARY

  end:
    name: 'End of release workflow'
    runs-on: 'ubuntu-latest'
    needs: [branch_name, semver_tag, summary]
    steps:
      - id: end
        name: End
        run: |
          echo "End"
